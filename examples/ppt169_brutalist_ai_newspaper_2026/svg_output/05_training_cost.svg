<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <!-- P05 Frontier Training Cost — banner image (#14) + line_chart (log scale), dense rhythm -->

  <defs>
    <clipPath id="bannerClip">
      <rect x="48" y="170" width="1184" height="184"/>
    </clipPath>
  </defs>

  <rect id="bg" width="1280" height="720" fill="#FFFFFF"/>

  <!-- ============ HEADER ============ -->
  <g id="bg-masthead-rule">
    <rect x="0" y="0" width="1280" height="4" fill="#C8102E"/>
  </g>

  <g id="header-folio">
    <line x1="48" y1="34" x2="1232" y2="34" stroke="#111111" stroke-width="1"/>
    <text x="48" y="26" font-family="Consolas, &quot;Courier New&quot;, monospace" font-size="10" font-weight="700" fill="#111111" letter-spacing="2">THE AI INDUSTRY 2026 · ANNUAL REPORT</text>
    <text x="640" y="26" font-family="Consolas, &quot;Courier New&quot;, monospace" font-size="10" font-weight="700" fill="#111111" text-anchor="middle" letter-spacing="2">STORY II · FRONTIER COMPUTE</text>
    <text x="1232" y="26" font-family="Consolas, &quot;Courier New&quot;, monospace" font-size="10" font-weight="700" fill="#111111" text-anchor="end" letter-spacing="2">VOL. 1 · NO. 1 · MAY 2026</text>
  </g>

  <g id="header">
    <text x="48" y="58" font-family="&quot;Arial Black&quot;, SimHei, sans-serif" font-size="11" font-weight="900" fill="#C8102E" letter-spacing="3.5">SECTION III · STORY II</text>
    <text x="48" y="110" font-family="Impact, &quot;Arial Black&quot;, SimHei, sans-serif" font-size="44" font-weight="900" fill="#111111" letter-spacing="-1">PAST THE HALF-BILLION LINE</text>
    <text x="48" y="138" font-family="&quot;Times New Roman&quot;, SimSun, serif" font-size="16" font-style="italic" fill="#111111">Frontier 2026 runs land between <tspan fill="#C8102E" font-weight="700">1 e26</tspan> and <tspan fill="#C8102E" font-weight="700">1 e27 FLOPs</tspan>. Late-2027 projection: <tspan fill="#C8102E" font-weight="700">$1–3 B</tspan> per run.</text>
    <line x1="48" y1="156" x2="1232" y2="156" stroke="#111111" stroke-width="2"/>
  </g>

  <!-- ============ BANNER IMAGE (mid-section, #14) ============ -->
  <g id="banner-image">
    <image href="../images/p05_training_cost.png" x="48" y="170" width="1184" height="184" clip-path="url(#bannerClip)" preserveAspectRatio="xMidYMid slice"/>
    <rect x="48" y="170" width="1184" height="184" fill="none" stroke="#111111" stroke-width="1"/>
  </g>

  <g id="banner-caption">
    <text x="48" y="376" font-family="&quot;Arial Black&quot;, SimHei, sans-serif" font-size="11" font-weight="900" fill="#111111" letter-spacing="2">FIG. 02 · A FRONTIER SERVER HALL</text>
    <text x="1232" y="376" font-family="&quot;Times New Roman&quot;, SimSun, serif" font-size="11" font-style="italic" fill="#3A3A3A" text-anchor="end">— power and grid interconnect, not chips, are the binding constraint for the late-2027 cohort.</text>
    <line x1="48" y1="384" x2="1232" y2="384" stroke="#111111" stroke-width="0.5"/>
  </g>

  <!-- ============ LINE CHART (training cost trajectory, log scale) ============ -->
  <g id="chart-title">
    <text x="48" y="406" font-family="&quot;Arial Black&quot;, SimHei, sans-serif" font-size="13" font-weight="900" fill="#111111" letter-spacing="1.5">FIG. 03 · TRAINING COST PER FRONTIER RUN · USD MILLIONS · LOG SCALE</text>
  </g>

  <g id="chartArea">
    <!-- Y-axis gridlines (log scale): $50 / $100 / $200 / $500 / $1000 / $3000 (in M) -->
    <line x1="140" y1="580" x2="1140" y2="580" stroke="#3A3A3A" stroke-width="0.5" stroke-dasharray="2,3"/>
    <line x1="140" y1="556" x2="1140" y2="556" stroke="#3A3A3A" stroke-width="0.5" stroke-dasharray="2,3"/>
    <line x1="140" y1="532" x2="1140" y2="532" stroke="#3A3A3A" stroke-width="0.5" stroke-dasharray="2,3"/>
    <line x1="140" y1="500" x2="1140" y2="500" stroke="#111111" stroke-width="1"/>
    <line x1="140" y1="476" x2="1140" y2="476" stroke="#3A3A3A" stroke-width="0.5" stroke-dasharray="2,3"/>
    <line x1="140" y1="438" x2="1140" y2="438" stroke="#3A3A3A" stroke-width="0.5" stroke-dasharray="2,3"/>

    <!-- The $500M reference line emphasized as the "half-billion line" -->
    <text x="1148" y="503" font-family="&quot;Arial Black&quot;, SimHei, sans-serif" font-size="10" font-weight="900" fill="#C8102E" letter-spacing="1">$500 M LINE</text>

    <!-- Y-axis labels (left, mono) -->
    <text x="130" y="584" font-family="Consolas, &quot;Courier New&quot;, monospace" font-size="9" fill="#3A3A3A" text-anchor="end">$50 M</text>
    <text x="130" y="560" font-family="Consolas, &quot;Courier New&quot;, monospace" font-size="9" fill="#3A3A3A" text-anchor="end">$100 M</text>
    <text x="130" y="536" font-family="Consolas, &quot;Courier New&quot;, monospace" font-size="9" fill="#3A3A3A" text-anchor="end">$200 M</text>
    <text x="130" y="504" font-family="Consolas, &quot;Courier New&quot;, monospace" font-size="9" font-weight="700" fill="#C8102E" text-anchor="end">$500 M</text>
    <text x="130" y="480" font-family="Consolas, &quot;Courier New&quot;, monospace" font-size="9" fill="#3A3A3A" text-anchor="end">$1 B</text>
    <text x="130" y="442" font-family="Consolas, &quot;Courier New&quot;, monospace" font-size="9" fill="#3A3A3A" text-anchor="end">$3 B</text>

    <!-- Y-axis baseline -->
    <line x1="140" y1="420" x2="140" y2="580" stroke="#111111" stroke-width="1"/>
    <!-- X-axis baseline -->
    <line x1="140" y1="580" x2="1140" y2="580" stroke="#111111" stroke-width="1.5"/>

    <!-- chart-plot-area: 140,420,1140,580 -->

    <!-- Data line (solid through 4 actuals, dashed through projection) -->
    <!-- Points: GPT-4 (140,565), Llama (390,537), Gemini (640,533), 2026 Frontier (890,512), 2027 Projected (1140,452) -->
    <polyline points="140,565 390,537 640,533 890,512" fill="none" stroke="#111111" stroke-width="2.5" stroke-linecap="square" stroke-linejoin="miter"/>
    <line x1="890" y1="512" x2="1140" y2="452" stroke="#C8102E" stroke-width="2.5" stroke-dasharray="6,4" stroke-linecap="square"/>

    <!-- Range bars for 2026 Frontier ($200M-$500M) and 2027 Projected ($1B-$3B) -->
    <!-- 2026: low $200M → y=532, high $500M → y=500 -->
    <line x1="890" y1="500" x2="890" y2="532" stroke="#111111" stroke-width="6"/>
    <line x1="882" y1="500" x2="898" y2="500" stroke="#111111" stroke-width="2"/>
    <line x1="882" y1="532" x2="898" y2="532" stroke="#111111" stroke-width="2"/>

    <!-- 2027: low $1B → y=476, high $3B → y=438 -->
    <line x1="1140" y1="438" x2="1140" y2="476" stroke="#C8102E" stroke-width="6"/>
    <line x1="1132" y1="438" x2="1148" y2="438" stroke="#C8102E" stroke-width="2"/>
    <line x1="1132" y1="476" x2="1148" y2="476" stroke="#C8102E" stroke-width="2"/>

    <!-- Data dots -->
    <circle cx="140" cy="565" r="7" fill="#111111"/>
    <circle cx="390" cy="537" r="7" fill="#111111"/>
    <circle cx="640" cy="533" r="7" fill="#111111"/>

    <!-- Data dot labels (top of dot, $ value) -->
    <text x="140" y="552" font-family="&quot;Arial Black&quot;, SimHei, sans-serif" font-size="11" font-weight="900" fill="#111111" text-anchor="middle">$78 M</text>
    <text x="390" y="524" font-family="&quot;Arial Black&quot;, SimHei, sans-serif" font-size="11" font-weight="900" fill="#111111" text-anchor="middle">$170 M</text>
    <text x="640" y="520" font-family="&quot;Arial Black&quot;, SimHei, sans-serif" font-size="11" font-weight="900" fill="#111111" text-anchor="middle">$191 M</text>
    <text x="890" y="487" font-family="&quot;Arial Black&quot;, SimHei, sans-serif" font-size="11" font-weight="900" fill="#111111" text-anchor="middle">$200 – 500 M</text>
    <text x="1140" y="425" font-family="&quot;Arial Black&quot;, SimHei, sans-serif" font-size="11" font-weight="900" fill="#C8102E" text-anchor="middle">$1 – 3 B</text>

    <!-- X-axis category labels (bottom) -->
    <text x="140" y="600" font-family="&quot;Arial Black&quot;, SimHei, sans-serif" font-size="11" font-weight="900" fill="#111111" text-anchor="middle">GPT-4</text>
    <text x="140" y="614" font-family="Consolas, &quot;Courier New&quot;, monospace" font-size="9" fill="#3A3A3A" text-anchor="middle">MAR 2023</text>
    <text x="390" y="600" font-family="&quot;Arial Black&quot;, SimHei, sans-serif" font-size="11" font-weight="900" fill="#111111" text-anchor="middle">LLAMA 3.1 405B</text>
    <text x="390" y="614" font-family="Consolas, &quot;Courier New&quot;, monospace" font-size="9" fill="#3A3A3A" text-anchor="middle">JUL 2024</text>
    <text x="640" y="600" font-family="&quot;Arial Black&quot;, SimHei, sans-serif" font-size="11" font-weight="900" fill="#111111" text-anchor="middle">GEMINI ULTRA</text>
    <text x="640" y="614" font-family="Consolas, &quot;Courier New&quot;, monospace" font-size="9" fill="#3A3A3A" text-anchor="middle">DEC 2024</text>
    <text x="890" y="600" font-family="&quot;Arial Black&quot;, SimHei, sans-serif" font-size="11" font-weight="900" fill="#111111" text-anchor="middle">2026 FRONTIER</text>
    <text x="890" y="614" font-family="Consolas, &quot;Courier New&quot;, monospace" font-size="9" fill="#3A3A3A" text-anchor="middle">1e26 – 1e27 FLOPS</text>
    <text x="1140" y="600" font-family="&quot;Arial Black&quot;, SimHei, sans-serif" font-size="11" font-weight="900" fill="#C8102E" text-anchor="middle">2027 PROJECTED</text>
    <text x="1140" y="614" font-family="Consolas, &quot;Courier New&quot;, monospace" font-size="9" fill="#C8102E" text-anchor="middle">DASHED · ESTIMATE</text>
  </g>

  <!-- ============ ANNOTATION ROW ============ -->
  <line x1="48" y1="630" x2="1232" y2="630" stroke="#111111" stroke-width="2"/>
  <g id="annotation">
    <text x="48" y="650" font-family="&quot;Arial Black&quot;, SimHei, sans-serif" font-size="12" font-weight="900" fill="#111111" letter-spacing="1.5">WHAT THE LINE MEANS  —</text>
    <text x="240" y="650" font-family="&quot;Times New Roman&quot;, SimSun, serif" font-size="13" fill="#111111">a single training run for a 2026 frontier model now exceeds the lifetime engineering budget of most enterprise software products.</text>
    <text x="48" y="670" font-family="&quot;Times New Roman&quot;, SimSun, serif" font-size="13" fill="#111111">Capital is no longer the gating factor; <tspan font-weight="700">grid interconnect</tspan> and <tspan font-weight="700">multi-gigawatt power siting</tspan> are. The next cohort is being built around substations, not around chips.</text>
  </g>

  <!-- ============ FOOTER ============ -->
  <g id="footer-imprint">
    <rect x="48" y="688" width="1184" height="2" fill="#C8102E"/>
    <text x="48" y="708" font-family="Consolas, &quot;Courier New&quot;, monospace" font-size="9" font-weight="700" fill="#111111" letter-spacing="2">SOURCE  EPOCH AI · DELUAIR CONSULTANCY 2026 · LOG-SCALE PLOT · COMPUTE-ONLY COST · POWER &amp; SITE EXCLUDED</text>
    <text x="1232" y="708" font-family="Consolas, &quot;Courier New&quot;, monospace" font-size="9" font-weight="700" fill="#111111" text-anchor="end" letter-spacing="2">PAGE 05 / 10</text>
  </g>
</svg>
