<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <!-- P09 Timeline 2025–2026 — six milestones on horizontal axis, dense rhythm -->

  <rect id="bg" width="1280" height="720" fill="#FFFFFF"/>

  <!-- ============ HEADER ============ -->
  <g id="bg-masthead-rule">
    <rect x="0" y="0" width="1280" height="4" fill="#C8102E"/>
  </g>

  <g id="header-folio">
    <line x1="48" y1="34" x2="1232" y2="34" stroke="#111111" stroke-width="1"/>
    <text x="48" y="26" font-family="Consolas, &quot;Courier New&quot;, monospace" font-size="10" font-weight="700" fill="#111111" letter-spacing="2">THE AI INDUSTRY 2026 · ANNUAL REPORT</text>
    <text x="640" y="26" font-family="Consolas, &quot;Courier New&quot;, monospace" font-size="10" font-weight="700" fill="#111111" text-anchor="middle" letter-spacing="2">CHRONICLE · 16 MONTHS</text>
    <text x="1232" y="26" font-family="Consolas, &quot;Courier New&quot;, monospace" font-size="10" font-weight="700" fill="#111111" text-anchor="end" letter-spacing="2">VOL. 1 · NO. 1 · MAY 2026</text>
  </g>

  <g id="header">
    <text x="48" y="58" font-family="&quot;Arial Black&quot;, SimHei, sans-serif" font-size="11" font-weight="900" fill="#C8102E" letter-spacing="3.5">SECTION VII · CHRONICLE</text>
    <text x="48" y="110" font-family="Impact, &quot;Arial Black&quot;, SimHei, sans-serif" font-size="44" font-weight="900" fill="#111111" letter-spacing="-1">2025 – 2026  ·  SIX MILESTONES</text>
    <text x="48" y="138" font-family="&quot;Times New Roman&quot;, SimSun, serif" font-size="16" font-style="italic" fill="#111111">From <tspan fill="#C8102E" font-weight="700">EO 14179</tspan> to the <tspan fill="#C8102E" font-weight="700">AI Index 2026</tspan> — sixteen months that rewrote the league table.</text>
    <line x1="48" y1="156" x2="1232" y2="156" stroke="#111111" stroke-width="2"/>
  </g>

  <!-- ============ YEAR BANDS ============ -->
  <g id="year-bands">
    <!-- 2025 band -->
    <rect x="100" y="350" width="810" height="40" fill="#F4F1EA"/>
    <text x="108" y="378" font-family="Impact, &quot;Arial Black&quot;, SimHei, sans-serif" font-size="28" font-weight="900" fill="#CBC8B7" letter-spacing="6">2025</text>
    <!-- 2026 band -->
    <rect x="910" y="350" width="270" height="40" fill="#F4F1EA"/>
    <text x="918" y="378" font-family="Impact, &quot;Arial Black&quot;, SimHei, sans-serif" font-size="28" font-weight="900" fill="#CBC8B7" letter-spacing="6">2026</text>
  </g>

  <!-- ============ TIMELINE AXIS ============ -->
  <g id="timeline-axis">
    <!-- Horizontal axis (thick black rule) -->
    <line x1="100" y1="370" x2="1180" y2="370" stroke="#111111" stroke-width="4"/>
    <!-- Quarter tick marks (small) -->
    <line x1="100" y1="392" x2="100" y2="402" stroke="#111111" stroke-width="1"/>
    <line x1="302" y1="392" x2="302" y2="402" stroke="#111111" stroke-width="1"/>
    <line x1="505" y1="392" x2="505" y2="402" stroke="#111111" stroke-width="1"/>
    <line x1="707" y1="392" x2="707" y2="402" stroke="#111111" stroke-width="1"/>
    <line x1="910" y1="392" x2="910" y2="402" stroke="#111111" stroke-width="1"/>
    <line x1="1112" y1="392" x2="1112" y2="402" stroke="#111111" stroke-width="1"/>

    <text x="100" y="416" font-family="Consolas, &quot;Courier New&quot;, monospace" font-size="9" fill="#3A3A3A" text-anchor="middle">Q1</text>
    <text x="302" y="416" font-family="Consolas, &quot;Courier New&quot;, monospace" font-size="9" fill="#3A3A3A" text-anchor="middle">Q2</text>
    <text x="505" y="416" font-family="Consolas, &quot;Courier New&quot;, monospace" font-size="9" fill="#3A3A3A" text-anchor="middle">Q3</text>
    <text x="707" y="416" font-family="Consolas, &quot;Courier New&quot;, monospace" font-size="9" fill="#3A3A3A" text-anchor="middle">Q4</text>
    <text x="910" y="416" font-family="Consolas, &quot;Courier New&quot;, monospace" font-size="9" fill="#3A3A3A" text-anchor="middle">Q1</text>
    <text x="1112" y="416" font-family="Consolas, &quot;Courier New&quot;, monospace" font-size="9" fill="#3A3A3A" text-anchor="middle">Q2</text>
  </g>

  <!-- chart-plot-area: 100,350,1180,390 -->

  <!-- ============ MILESTONE 1 — 2025-01 (x=100), ABOVE ============ -->
  <g id="milestone-1">
    <line x1="100" y1="350" x2="100" y2="280" stroke="#111111" stroke-width="1"/>
    <circle cx="100" cy="370" r="10" fill="#111111"/>
    <line x1="48" y1="192" x2="252" y2="192" stroke="#111111" stroke-width="2"/>
    <text x="48" y="216" font-family="&quot;Arial Black&quot;, SimHei, sans-serif" font-size="13" font-weight="900" fill="#C8102E" letter-spacing="1.5">2025-01</text>
    <text x="48" y="240" font-family="&quot;Arial Black&quot;, SimHei, sans-serif" font-size="13" font-weight="900" fill="#111111" letter-spacing="0.5">US EO 14179 SIGNED</text>
    <text x="48" y="258" font-family="&quot;Times New Roman&quot;, SimSun, serif" font-size="11" fill="#111111">Federal posture reversed — innovation</text>
    <text x="48" y="272" font-family="&quot;Times New Roman&quot;, SimSun, serif" font-size="11" fill="#111111">first over restriction; the state-level</text>
    <text x="48" y="286" font-family="&quot;Times New Roman&quot;, SimSun, serif" font-size="11" fill="#111111">race opens.</text>
  </g>

  <!-- ============ MILESTONE 2 — 2025-08 (x=572.5≈573), BELOW ============ -->
  <g id="milestone-2">
    <line x1="573" y1="390" x2="573" y2="460" stroke="#111111" stroke-width="1"/>
    <circle cx="573" cy="370" r="10" fill="#111111"/>
    <line x1="471" y1="460" x2="675" y2="460" stroke="#111111" stroke-width="2"/>
    <text x="471" y="484" font-family="&quot;Arial Black&quot;, SimHei, sans-serif" font-size="13" font-weight="900" fill="#C8102E" letter-spacing="1.5">2025-08</text>
    <text x="471" y="508" font-family="&quot;Arial Black&quot;, SimHei, sans-serif" font-size="13" font-weight="900" fill="#111111" letter-spacing="0.5">EU AI ACT — FULL FORCE</text>
    <text x="471" y="526" font-family="&quot;Times New Roman&quot;, SimSun, serif" font-size="11" fill="#111111">First binding horizontal AI statute on</text>
    <text x="471" y="540" font-family="&quot;Times New Roman&quot;, SimSun, serif" font-size="11" fill="#111111">a major economy. Penalty ceiling:</text>
    <text x="471" y="554" font-family="&quot;Times New Roman&quot;, SimSun, serif" font-size="11" fill="#111111">€35 M or 7 % of global turnover.</text>
  </g>

  <!-- ============ MILESTONE 3 — 2025-09 (x=640), ABOVE ============ -->
  <g id="milestone-3">
    <line x1="640" y1="350" x2="640" y2="280" stroke="#111111" stroke-width="1"/>
    <circle cx="640" cy="370" r="10" fill="#111111"/>
    <line x1="538" y1="192" x2="742" y2="192" stroke="#111111" stroke-width="2"/>
    <text x="538" y="216" font-family="&quot;Arial Black&quot;, SimHei, sans-serif" font-size="13" font-weight="900" fill="#C8102E" letter-spacing="1.5">2025-09</text>
    <text x="538" y="240" font-family="&quot;Arial Black&quot;, SimHei, sans-serif" font-size="13" font-weight="900" fill="#111111" letter-spacing="0.5">CHINA WATERMARK RULES</text>
    <text x="538" y="258" font-family="&quot;Times New Roman&quot;, SimSun, serif" font-size="11" fill="#111111">First state-mandated synthetic-</text>
    <text x="538" y="272" font-family="&quot;Times New Roman&quot;, SimSun, serif" font-size="11" fill="#111111">content identification regime at</text>
    <text x="538" y="286" font-family="&quot;Times New Roman&quot;, SimSun, serif" font-size="11" fill="#111111">frontier-deployment scale.</text>
  </g>

  <!-- ============ MILESTONE 4 — 2025-Q4 (x=775), BELOW ============ -->
  <g id="milestone-4">
    <line x1="775" y1="390" x2="775" y2="460" stroke="#111111" stroke-width="1"/>
    <circle cx="775" cy="370" r="10" fill="#111111"/>
    <line x1="673" y1="460" x2="877" y2="460" stroke="#111111" stroke-width="2"/>
    <text x="673" y="484" font-family="&quot;Arial Black&quot;, SimHei, sans-serif" font-size="13" font-weight="900" fill="#C8102E" letter-spacing="1.5">2025-Q4</text>
    <text x="673" y="508" font-family="&quot;Arial Black&quot;, SimHei, sans-serif" font-size="13" font-weight="900" fill="#111111" letter-spacing="0.5">DEEPSEEK-R1 RELEASED</text>
    <text x="673" y="526" font-family="&quot;Times New Roman&quot;, SimSun, serif" font-size="11" fill="#111111">Open-weights reasoning at frontier-</text>
    <text x="673" y="540" font-family="&quot;Times New Roman&quot;, SimSun, serif" font-size="11" fill="#111111">adjacent capability; reframes the</text>
    <text x="673" y="554" font-family="&quot;Times New Roman&quot;, SimSun, serif" font-size="11" fill="#111111">inference-cost conversation.</text>
  </g>

  <!-- ============ MILESTONE 5 — 2026-Q1 (x=978), ABOVE — emphasized red ============ -->
  <g id="milestone-5">
    <line x1="978" y1="350" x2="978" y2="280" stroke="#C8102E" stroke-width="1.5"/>
    <circle cx="978" cy="370" r="11" fill="#C8102E"/>
    <line x1="876" y1="192" x2="1080" y2="192" stroke="#C8102E" stroke-width="2"/>
    <text x="876" y="216" font-family="&quot;Arial Black&quot;, SimHei, sans-serif" font-size="13" font-weight="900" fill="#C8102E" letter-spacing="1.5">2026-Q1</text>
    <text x="876" y="240" font-family="&quot;Arial Black&quot;, SimHei, sans-serif" font-size="13" font-weight="900" fill="#C8102E" letter-spacing="0.5">ANTHROPIC TAKES #1</text>
    <text x="876" y="258" font-family="&quot;Times New Roman&quot;, SimSun, serif" font-size="11" fill="#111111">31.4 % vs OpenAI 29.0 % — first</text>
    <text x="876" y="272" font-family="&quot;Times New Roman&quot;, SimSun, serif" font-size="11" fill="#111111">non-OpenAI lab in the #1 revenue</text>
    <text x="876" y="286" font-family="&quot;Times New Roman&quot;, SimSun, serif" font-size="11" fill="#111111">spot since the modern era began.</text>
  </g>

  <!-- ============ MILESTONE 6 — 2026-04 (x=1113), BELOW ============ -->
  <g id="milestone-6">
    <line x1="1113" y1="390" x2="1113" y2="460" stroke="#111111" stroke-width="1"/>
    <circle cx="1113" cy="370" r="10" fill="#111111"/>
    <line x1="1011" y1="460" x2="1215" y2="460" stroke="#111111" stroke-width="2"/>
    <text x="1011" y="484" font-family="&quot;Arial Black&quot;, SimHei, sans-serif" font-size="13" font-weight="900" fill="#C8102E" letter-spacing="1.5">2026-04</text>
    <text x="1011" y="508" font-family="&quot;Arial Black&quot;, SimHei, sans-serif" font-size="13" font-weight="900" fill="#111111" letter-spacing="0.5">AI INDEX 2026 PUBLISHED</text>
    <text x="1011" y="526" font-family="&quot;Times New Roman&quot;, SimSun, serif" font-size="11" fill="#111111">First year SWE-bench Verified hits</text>
    <text x="1011" y="540" font-family="&quot;Times New Roman&quot;, SimSun, serif" font-size="11" fill="#111111">~100 % of human baseline; benchmark</text>
    <text x="1011" y="554" font-family="&quot;Times New Roman&quot;, SimSun, serif" font-size="11" fill="#111111">half-life now months, not years.</text>
  </g>

  <!-- ============ EDITORIAL CLOSING LINE ============ -->
  <line x1="48" y1="600" x2="1232" y2="600" stroke="#111111" stroke-width="2"/>
  <g id="closing">
    <text x="48" y="628" font-family="&quot;Arial Black&quot;, SimHei, sans-serif" font-size="14" font-weight="900" fill="#111111" letter-spacing="1.5">SIXTEEN MONTHS, THREE STRUCTURAL SHIFTS</text>
    <line x1="48" y1="638" x2="1232" y2="638" stroke="#111111" stroke-width="0.5"/>
    <text x="48" y="660" font-family="&quot;Times New Roman&quot;, SimSun, serif" font-size="13" fill="#111111">Compliance: from one rulebook to three. Compute: from $100 M runs to $500 M ones. Capability: from benchmarks lasting years to benchmarks lasting months. None of these</text>
    <text x="48" y="676" font-family="&quot;Times New Roman&quot;, SimSun, serif" font-size="13" fill="#111111">unwinds on the present trajectory — and the late-2027 projection of $1–3 B per run, plus an inference-spread doubling, raises the bar for the next twelve months.</text>
  </g>

  <!-- ============ FOOTER ============ -->
  <g id="footer-imprint">
    <rect x="48" y="688" width="1184" height="2" fill="#C8102E"/>
    <text x="48" y="708" font-family="Consolas, &quot;Courier New&quot;, monospace" font-size="9" font-weight="700" fill="#111111" letter-spacing="2">SOURCES  STANFORD HAI · COUNTERPOINT · ONETRUST · WHITE HOUSE · EUROPEAN COMMISSION · CAC · DEEPSEEK PRESS · IEEE SPECTRUM</text>
    <text x="1232" y="708" font-family="Consolas, &quot;Courier New&quot;, monospace" font-size="9" font-weight="700" fill="#111111" text-anchor="end" letter-spacing="2">PAGE 09 / 10</text>
  </g>
</svg>
