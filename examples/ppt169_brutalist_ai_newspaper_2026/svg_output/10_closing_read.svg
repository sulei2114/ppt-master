<?xml version='1.0' encoding='UTF-8'?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  

  <rect id="bg" width="1280" height="720" fill="#FFFFFF" />

  
  <g id="bg-masthead-rule">
    <rect x="0" y="0" width="1280" height="4" fill="#C8102E" />
  </g>

  <g id="header-folio">
    <line x1="48" y1="34" x2="1232" y2="34" stroke="#111111" stroke-width="1" />
    <text x="48" y="26" font-family="Consolas, &quot;Courier New&quot;, monospace" font-size="10" font-weight="700" fill="#111111" letter-spacing="2">THE AI INDUSTRY 2026 · ANNUAL REPORT</text>
    <text x="640" y="26" font-family="Consolas, &quot;Courier New&quot;, monospace" font-size="10" font-weight="700" fill="#111111" text-anchor="middle" letter-spacing="2">CLOSING READ</text>
    <text x="1232" y="26" font-family="Consolas, &quot;Courier New&quot;, monospace" font-size="10" font-weight="700" fill="#111111" text-anchor="end" letter-spacing="2">VOL. 1 · NO. 1 · MAY 2026</text>
  </g>

  <g id="header">
    <text x="48" y="58" font-family="&quot;Arial Black&quot;, SimHei, sans-serif" font-size="11" font-weight="900" fill="#C8102E" letter-spacing="3.5">SECTION VIII · CLOSING</text>
    <text x="48" y="110" font-family="Impact, &quot;Arial Black&quot;, SimHei, sans-serif" font-size="48" font-weight="900" fill="#111111" letter-spacing="-1">WHAT CHANGED. WHAT DIDN'T.</text>
    <text x="48" y="138" font-family="&quot;Times New Roman&quot;, SimSun, serif" font-size="16" font-style="italic" fill="#111111">Eight observations to carry forward.</text>
    <line x1="48" y1="156" x2="1232" y2="156" stroke="#111111" stroke-width="2" />
  </g>

  
  <line x1="640" y1="180" x2="640" y2="540" stroke="#111111" stroke-width="1"/>

  
  <g id="changed-header">
    <text x="48" y="206" font-family="Impact, &quot;Arial Black&quot;, SimHei, sans-serif" font-size="22" font-weight="900" fill="#C8102E" letter-spacing="3">CHANGED</text>
    <line x1="48" y1="220" x2="612" y2="220" stroke="#C8102E" stroke-width="2" />
  </g>

  <g id="changed-1">
    <text x="48" y="252" font-family="Consolas, &quot;Courier New&quot;, monospace" font-size="11" font-weight="700" fill="#C8102E" letter-spacing="2">I.</text>
    <text x="76" y="252" font-family="&quot;Arial Black&quot;, SimHei, sans-serif" font-size="14" font-weight="900" fill="#111111" letter-spacing="1">REVENUE LEADER NO LONGER USER-COUNT LEADER.</text>
    <text x="76" y="276" font-family="&quot;Times New Roman&quot;, SimSun, serif" font-size="13" fill="#111111">Anthropic leads on revenue with a 7× smaller user base than OpenAI.</text>
  </g>

  <g id="changed-2">
    <line x1="48" y1="306" x2="612" y2="306" stroke="#3A3A3A" stroke-width="0.5" />
    <text x="48" y="332" font-family="Consolas, &quot;Courier New&quot;, monospace" font-size="11" font-weight="700" fill="#C8102E" letter-spacing="2">II.</text>
    <text x="76" y="332" font-family="&quot;Arial Black&quot;, SimHei, sans-serif" font-size="14" font-weight="900" fill="#111111" letter-spacing="1">TRAINING COST CROSSED THE HALF-BILLION LINE.</text>
    <text x="76" y="356" font-family="&quot;Times New Roman&quot;, SimSun, serif" font-size="13" fill="#111111">2026 frontier runs land $200 – $500 M; the 2027 cohort heads to $1 – 3 B.</text>
  </g>

  <g id="changed-3">
    <line x1="48" y1="386" x2="612" y2="386" stroke="#3A3A3A" stroke-width="0.5" />
    <text x="48" y="412" font-family="Consolas, &quot;Courier New&quot;, monospace" font-size="11" font-weight="700" fill="#C8102E" letter-spacing="2">III.</text>
    <text x="86" y="412" font-family="&quot;Arial Black&quot;, SimHei, sans-serif" font-size="14" font-weight="900" fill="#111111" letter-spacing="1">INFERENCE BECAME A 4.6× DISCRIMINATOR.</text>
    <text x="86" y="436" font-family="&quot;Times New Roman&quot;, SimSun, serif" font-size="13" fill="#111111">Inside the frontier class: 5 W vs 23 W per medium prompt — same task.</text>
  </g>

  <g id="changed-4">
    <line x1="48" y1="466" x2="612" y2="466" stroke="#3A3A3A" stroke-width="0.5" />
    <text x="48" y="492" font-family="Consolas, &quot;Courier New&quot;, monospace" font-size="11" font-weight="700" fill="#C8102E" letter-spacing="2">IV.</text>
    <text x="86" y="492" font-family="&quot;Arial Black&quot;, SimHei, sans-serif" font-size="14" font-weight="900" fill="#111111" letter-spacing="1">BENCHMARK HALF-LIFE DROPPED YEARS → MONTHS.</text>
    <text x="86" y="516" font-family="&quot;Times New Roman&quot;, SimSun, serif" font-size="13" fill="#111111">Static benchmarks are losing meaning faster than bench-designers can write new ones.</text>
  </g>

  
  <g id="constant-header">
    <text x="660" y="206" font-family="Impact, &quot;Arial Black&quot;, SimHei, sans-serif" font-size="22" font-weight="900" fill="#111111" letter-spacing="3">DID NOT CHANGE</text>
    <line x1="660" y1="220" x2="1232" y2="220" stroke="#111111" stroke-width="2" />
  </g>

  <g id="constant-1">
    <text x="660" y="252" font-family="Consolas, &quot;Courier New&quot;, monospace" font-size="11" font-weight="700" fill="#3A3A3A" letter-spacing="2">I.</text>
    <text x="688" y="252" font-family="&quot;Arial Black&quot;, SimHei, sans-serif" font-size="14" font-weight="900" fill="#111111" letter-spacing="1">FRONTIER COHORT STILL ~5 LABS.</text>
    <text x="688" y="276" font-family="&quot;Times New Roman&quot;, SimSun, serif" font-size="13" fill="#111111">No Tier-1 lab has been added or removed since 2024.</text>
  </g>

  <g id="constant-2">
    <line x1="660" y1="306" x2="1232" y2="306" stroke="#3A3A3A" stroke-width="0.5" />
    <text x="660" y="332" font-family="Consolas, &quot;Courier New&quot;, monospace" font-size="11" font-weight="700" fill="#3A3A3A" letter-spacing="2">II.</text>
    <text x="688" y="332" font-family="&quot;Arial Black&quot;, SimHei, sans-serif" font-size="14" font-weight="900" fill="#111111" letter-spacing="1">CHINA FRONTIER LABS = $0 OF EU-MARKET REVENUE.</text>
    <text x="688" y="356" font-family="&quot;Times New Roman&quot;, SimSun, serif" font-size="13" fill="#111111">Three-rulebook divergence keeps the trade barrier where it was.</text>
  </g>

  <g id="constant-3">
    <line x1="660" y1="386" x2="1232" y2="386" stroke="#3A3A3A" stroke-width="0.5" />
    <text x="660" y="412" font-family="Consolas, &quot;Courier New&quot;, monospace" font-size="11" font-weight="700" fill="#3A3A3A" letter-spacing="2">III.</text>
    <text x="698" y="412" font-family="&quot;Arial Black&quot;, SimHei, sans-serif" font-size="14" font-weight="900" fill="#111111" letter-spacing="1">OPEN-WEIGHTS ≠ DIRECT REVENUE.</text>
    <text x="698" y="436" font-family="&quot;Times New Roman&quot;, SimSun, serif" font-size="13" fill="#111111">DeepSeek 0.2 %, Zhipu 0.1 %. Distribution and monetisation still decoupled.</text>
  </g>

  <g id="constant-4">
    <line x1="660" y1="466" x2="1232" y2="466" stroke="#3A3A3A" stroke-width="0.5" />
    <text x="660" y="492" font-family="Consolas, &quot;Courier New&quot;, monospace" font-size="11" font-weight="700" fill="#3A3A3A" letter-spacing="2">IV.</text>
    <text x="698" y="492" font-family="&quot;Arial Black&quot;, SimHei, sans-serif" font-size="14" font-weight="900" fill="#111111" letter-spacing="1">POWER &amp; GRID INTERCONNECT — STILL THE HARDEST INPUT.</text>
    <text x="698" y="516" font-family="&quot;Times New Roman&quot;, SimSun, serif" font-size="13" fill="#111111">Harder than chips, harder than capital, harder than talent. No 2025 progress.</text>
  </g>

  
  <line x1="48" y1="560" x2="1232" y2="560" stroke="#111111" stroke-width="2" />
  <g id="closing-aside">
    <text x="640" y="600" font-family="&quot;Times New Roman&quot;, SimSun, serif" font-size="18" font-style="italic" fill="#111111" text-anchor="middle">— what the next twelve months will test —</text>
    <text x="640" y="640" font-family="Impact, &quot;Arial Black&quot;, SimHei, sans-serif" font-size="28" font-weight="900" fill="#C8102E" text-anchor="middle" letter-spacing="-0.5">Can the second wave land the half-billion runs?</text>
  </g>

  
  <g id="footer-imprint">
    <rect x="48" y="676" width="1184" height="2" fill="#C8102E" />
    <text x="48" y="696" font-family="&quot;Arial Black&quot;, SimHei, sans-serif" font-size="10" font-weight="900" fill="#111111" letter-spacing="2">THE AI INDUSTRY 2026  ·  ANNUAL REPORT  ·  VOL. 1  ·  NO. 1  ·  MAY 2026</text>
    <text x="48" y="710" font-family="Consolas, &quot;Courier New&quot;, monospace" font-size="9" fill="#3A3A3A" letter-spacing="2">PPT MASTER · BRUTALIST NEWSPAPER DEMO · ROADMAP §P0-2 · CAPABILITY-SHOWCASE DECK · COMPILED IN ONE WEEK</text>
    <text x="1232" y="710" font-family="Consolas, &quot;Courier New&quot;, monospace" font-size="9" font-weight="700" fill="#111111" text-anchor="end" letter-spacing="2">PAGE 10 / 10  ·  END</text>
  </g>
</svg>