      </text><text font-size="14" fill="#C9C5BE" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" x="80" y="538"><tspan>• Q4 IPO 目标 <tspan fill="#E63946" font-weight="bold">$1T</tspan></tspan>
