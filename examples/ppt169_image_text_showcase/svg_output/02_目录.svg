    <!-- P06 -->
    <text x="390" y="276" font-family="Consolas, 'Courier New', monospace"
          font-size="13" fill="#5A5A72">06</text>
    <text x="418" y="276" font-family="Arial, 'Microsoft YaHei', sans-serif"
