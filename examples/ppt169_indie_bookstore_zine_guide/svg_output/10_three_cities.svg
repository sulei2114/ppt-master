<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <pattern id="dotP10" x="0" y="0" width="7" height="7" patternUnits="userSpaceOnUse">
      <circle cx="3.5" cy="3.5" r="0.7" fill="#1A1A1A" fill-opacity="0.1"/>
    </pattern>
  </defs>

  <rect id="bg" width="1280" height="720" fill="#F5EFE0"/>
  <rect id="grain" width="1280" height="720" fill="url(#dotP10)"/>

  <g id="header">
    <rect x="60" y="56" width="14" height="68" fill="#1E4DBC"/>
    <rect x="63" y="59" width="14" height="68" fill="#FF5C8A" opacity="0.7"/>
    <rect x="60" y="56" width="14" height="68" fill="#1E4DBC"/>
    <text x="92" y="98" font-family="Impact, 'Arial Black', 'Microsoft YaHei', sans-serif" font-size="46" fill="#1A1A1A" letter-spacing="-1">三座城市 · 三种姿态</text>
    <text x="92" y="128" font-family="Consolas, 'Courier New', monospace" font-size="13" fill="#5A5A5A" letter-spacing="3">THREE CITIES · THREE BOOKSTORE TEMPERAMENTS</text>
  </g>

  <line x1="60" y1="152" x2="1220" y2="152" stroke="#1A1A1A" stroke-width="3"/>

  <!-- Top triptych banner -->
  <g id="triptych">
    <rect x="58" y="172" width="1164" height="160" fill="#FF5C8A"/>
    <image href="../images/three_cities_triptych.png" x="60" y="170" width="1160" height="160" preserveAspectRatio="xMidYMid slice"/>
    <line x1="60" y1="330" x2="1220" y2="330" stroke="#1A1A1A" stroke-width="3"/>
  </g>

  <!-- Three city pillars -->
  <g id="pillar-paris">
    <rect x="60" y="350" width="380" height="320" fill="#1A1A1A"/>
    <rect x="63" y="353" width="380" height="320" fill="#FF5C8A" opacity="0.5"/>
    <rect x="60" y="350" width="380" height="320" fill="#1A1A1A"/>
    <!-- top color header band -->
    <rect x="60" y="350" width="380" height="68" fill="#1E4DBC"/>
    <text x="76" y="394" font-family="Impact, 'Arial Black', 'Microsoft YaHei', sans-serif" font-size="36" fill="#F5EFE0">PARIS</text>
    <text x="424" y="394" font-family="Consolas, 'Courier New', monospace" font-size="13" fill="#FF5C8A" text-anchor="end" letter-spacing="2">巴黎</text>
    <!-- body -->
    <text x="80" y="450" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="22" font-weight="900" fill="#F5EFE0">Shakespeare and Company</text>
    <text x="80" y="476" font-family="Consolas, 'Courier New', monospace" font-size="11" fill="#FF5C8A" letter-spacing="2">37 RUE DE LA BÛCHERIE · EST 1951</text>
    <line x1="80" y1="488" x2="200" y2="488" stroke="#FF5C8A" stroke-width="2"/>
    <text x="80" y="514" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="14" fill="#F5EFE0">·  原址 12 rue de l'Odéon</text>
    <text x="80" y="536" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="14" fill="#F5EFE0">  Sylvia Beach 1919 创办</text>
    <text x="80" y="566" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="14" fill="#F5EFE0">·  现址 1951 George Whitman</text>
    <text x="80" y="588" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="14" fill="#F5EFE0">  接纳数千 "TUMBLEWEEDS"</text>
    <text x="80" y="618" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="14" fill="#F5EFE0">·  住宿条件：每天读 1 小时</text>
    <text x="80" y="640" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="14" fill="#F5EFE0">  写一页自传 + 帮工</text>
    <text x="80" y="660" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="13" font-weight="900" fill="#FF5C8A">→ 书店 = 写作者收容所</text>
  </g>

  <g id="pillar-london">
    <rect x="450" y="350" width="380" height="320" fill="#1A1A1A"/>
    <rect x="453" y="353" width="380" height="320" fill="#1E4DBC" opacity="0.5"/>
    <rect x="450" y="350" width="380" height="320" fill="#1A1A1A"/>
    <rect x="450" y="350" width="380" height="68" fill="#FF5C8A"/>
    <text x="466" y="394" font-family="Impact, 'Arial Black', 'Microsoft YaHei', sans-serif" font-size="36" fill="#F5EFE0">LONDON</text>
    <text x="814" y="394" font-family="Consolas, 'Courier New', monospace" font-size="13" fill="#1E4DBC" text-anchor="end" letter-spacing="2">伦敦</text>
    <text x="470" y="450" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="22" font-weight="900" fill="#F5EFE0">Daunt + Word on the Water</text>
    <text x="470" y="476" font-family="Consolas, 'Courier New', monospace" font-size="11" fill="#FF5C8A" letter-spacing="2">MARYLEBONE + REGENT'S CANAL</text>
    <line x1="470" y1="488" x2="590" y2="488" stroke="#FF5C8A" stroke-width="2"/>
    <text x="470" y="514" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="14" fill="#F5EFE0">·  DAUNT (Marylebone)</text>
    <text x="470" y="536" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="14" fill="#F5EFE0">  爱德华建筑 + 橡木阳台</text>
    <text x="470" y="558" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="14" fill="#F5EFE0">  + 彩色玻璃 + 按国家分类</text>
    <text x="470" y="588" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="14" fill="#F5EFE0">·  WORD ON THE WATER</text>
    <text x="470" y="610" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="14" fill="#F5EFE0">  1920s 荷兰运河船</text>
    <text x="470" y="632" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="14" fill="#F5EFE0">  皮椅 / 老打字机 / 火炉</text>
    <text x="470" y="660" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="13" font-weight="900" fill="#FF5C8A">→ 书店 = 场景即体验</text>
  </g>

  <g id="pillar-nyc">
    <rect x="840" y="350" width="380" height="320" fill="#1A1A1A"/>
    <rect x="843" y="353" width="380" height="320" fill="#E8A02E" opacity="0.5"/>
    <rect x="840" y="350" width="380" height="320" fill="#1A1A1A"/>
    <rect x="840" y="350" width="380" height="68" fill="#1E4DBC"/>
    <text x="856" y="394" font-family="Impact, 'Arial Black', 'Microsoft YaHei', sans-serif" font-size="36" fill="#F5EFE0">NEW YORK</text>
    <text x="1204" y="394" font-family="Consolas, 'Courier New', monospace" font-size="13" fill="#FF5C8A" text-anchor="end" letter-spacing="2">纽约</text>
    <text x="860" y="450" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="22" font-weight="900" fill="#F5EFE0">Strand + Yu and Me Books</text>
    <text x="860" y="476" font-family="Consolas, 'Courier New', monospace" font-size="11" fill="#FF5C8A" letter-spacing="2">BROADWAY + CHINATOWN</text>
    <line x1="860" y1="488" x2="980" y2="488" stroke="#FF5C8A" stroke-width="2"/>
    <text x="860" y="514" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="14" fill="#F5EFE0">·  STRAND (1927)</text>
    <text x="860" y="536" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="14" fill="#F5EFE0">  2,500,000 册藏书</text>
    <text x="860" y="558" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="14" fill="#F5EFE0">  自称 "18 英里书架"</text>
    <text x="860" y="588" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="14" fill="#F5EFE0">·  YU AND ME BOOKS (2021)</text>
    <text x="860" y="610" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="14" fill="#F5EFE0">  华埠首家亚裔女性书店</text>
    <text x="860" y="632" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="14" fill="#F5EFE0">  2023 火灾后社区众筹重建</text>
    <text x="860" y="660" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="13" font-weight="900" fill="#FF5C8A">→ 书店 = 社区基础设施</text>
  </g>

  <g id="footer">
    <line x1="60" y1="690" x2="1220" y2="690" stroke="#1A1A1A" stroke-width="1"/>
    <text x="60" y="708" font-family="Consolas, 'Courier New', monospace" font-size="11" fill="#5A5A5A" letter-spacing="2">P10 · PARIS × LONDON × NEW YORK</text>
    <text x="1220" y="708" font-family="Consolas, 'Courier New', monospace" font-size="11" fill="#5A5A5A" text-anchor="end" letter-spacing="2">收容所 / 场景 / 基础设施</text>
  </g>
</svg>
