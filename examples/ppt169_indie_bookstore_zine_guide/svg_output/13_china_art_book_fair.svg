<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <pattern id="dotP13" x="0" y="0" width="7" height="7" patternUnits="userSpaceOnUse">
      <circle cx="3.5" cy="3.5" r="0.7" fill="#1A1A1A" fill-opacity="0.1"/>
    </pattern>
  </defs>

  <rect id="bg" width="1280" height="720" fill="#F5EFE0"/>
  <rect id="grain" width="1280" height="720" fill="url(#dotP13)"/>

  <g id="header">
    <rect x="60" y="56" width="14" height="68" fill="#1E4DBC"/>
    <rect x="63" y="59" width="14" height="68" fill="#FF5C8A" opacity="0.7"/>
    <rect x="60" y="56" width="14" height="68" fill="#1E4DBC"/>
    <text x="92" y="98" font-family="Impact, 'Arial Black', 'Microsoft YaHei', sans-serif" font-size="46" fill="#1A1A1A" letter-spacing="-1">中国艺术书展双子星</text>
    <text x="92" y="128" font-family="Consolas, 'Courier New', monospace" font-size="13" fill="#5A5A5A" letter-spacing="3">SHANGHAI HOSTS THE MOST · NEW SHOPS PUBLISH HERE FIRST</text>
  </g>

  <line x1="60" y1="152" x2="1220" y2="152" stroke="#1A1A1A" stroke-width="3"/>

  <!-- Left hero image (1:1 ratio matches generated 720×720) -->
  <g id="left-hero">
    <rect x="62" y="172" width="380" height="496" fill="#FF5C8A"/>
    <image href="../images/zine_fair_scene.png" x="60" y="170" width="380" height="496" preserveAspectRatio="xMidYMid slice"/>
    <!-- caption -->
    <rect x="60" y="666" width="380" height="32" fill="#1E4DBC"/>
    <text x="80" y="687" font-family="Consolas, 'Courier New', monospace" font-size="12" fill="#F5EFE0" letter-spacing="2">BOOTH AISLE · SHANGHAI · 2026</text>
  </g>

  <!-- Right: two labeled cards -->
  <!-- Card 1 — abC -->
  <g id="card-abc">
    <!-- Outer frame -->
    <rect x="460" y="170" width="760" height="234" fill="#1A1A1A"/>
    <rect x="463" y="173" width="760" height="234" fill="#FF5C8A" opacity="0.55"/>
    <rect x="460" y="170" width="760" height="234" fill="#1A1A1A"/>
    <!-- Label tab top -->
    <rect x="460" y="170" width="320" height="50" fill="#1E4DBC"/>
    <text x="480" y="204" font-family="Impact, 'Arial Black', 'Microsoft YaHei', sans-serif" font-size="28" fill="#F5EFE0" letter-spacing="2">abC ART BOOK FAIR</text>
    <text x="1200" y="204" font-family="Consolas, 'Courier New', monospace" font-size="12" fill="#FF5C8A" text-anchor="end" letter-spacing="2">EST. 2015 · 京沪双城</text>
    <!-- Inner content -->
    <text x="480" y="252" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="17" font-weight="900" fill="#F5EFE0">art book in China · 国内最具影响力的艺术书展</text>
    <text x="480" y="280" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="14" fill="#F5EFE0">推广本土艺术家书 / 独立出版 + 引介国际优秀出版方</text>
    <!-- KPI inline -->
    <rect x="480" y="304" width="156" height="78" fill="#FF5C8A"/>
    <text x="558" y="338" font-family="Impact, 'Arial Black', 'Microsoft YaHei', sans-serif" font-size="36" fill="#F5EFE0" text-anchor="middle">145</text>
    <text x="558" y="362" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="11" fill="#F5EFE0" text-anchor="middle">中国艺术出版方</text>
    <text x="558" y="378" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="11" fill="#F5EFE0" text-anchor="middle">+ 个人创作者</text>

    <rect x="652" y="304" width="156" height="78" fill="#1E4DBC"/>
    <text x="730" y="338" font-family="Impact, 'Arial Black', 'Microsoft YaHei', sans-serif" font-size="36" fill="#F5EFE0" text-anchor="middle">41</text>
    <text x="730" y="362" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="11" fill="#F5EFE0" text-anchor="middle">国际出版方</text>
    <text x="730" y="378" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="11" fill="#F5EFE0" text-anchor="middle">参展 · 上海</text>

    <rect x="824" y="304" width="156" height="78" fill="#E8A02E"/>
    <text x="902" y="338" font-family="Impact, 'Arial Black', 'Microsoft YaHei', sans-serif" font-size="32" fill="#1A1A1A" text-anchor="middle">10,000+</text>
    <text x="902" y="362" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="11" fill="#1A1A1A" text-anchor="middle">参观人数</text>
    <text x="902" y="378" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="11" fill="#1A1A1A" text-anchor="middle">第 6 届上海</text>

    <text x="1000" y="338" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="13" font-weight="900" fill="#F5EFE0">→ 第一影响力</text>
    <text x="1000" y="358" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="11" fill="#F5EFE0">独立出版圈</text>
    <text x="1000" y="372" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="11" fill="#F5EFE0">年度风向标</text>
  </g>

  <!-- Card 2 — UNFOLD -->
  <g id="card-unfold">
    <rect x="460" y="424" width="760" height="234" fill="#1A1A1A"/>
    <rect x="463" y="427" width="760" height="234" fill="#1E4DBC" opacity="0.55"/>
    <rect x="460" y="424" width="760" height="234" fill="#1A1A1A"/>
    <rect x="460" y="424" width="320" height="50" fill="#FF5C8A"/>
    <text x="480" y="458" font-family="Impact, 'Arial Black', 'Microsoft YaHei', sans-serif" font-size="28" fill="#F5EFE0" letter-spacing="2">UNFOLD SHANGHAI</text>
    <text x="1200" y="458" font-family="Consolas, 'Courier New', monospace" font-size="12" fill="#1E4DBC" text-anchor="end" letter-spacing="2">紧随 abC · 一周后开幕</text>
    <text x="480" y="506" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="17" font-weight="900" fill="#F5EFE0">UNFOLD Shanghai Art Book Fair · 第二影响力</text>
    <text x="480" y="534" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="14" fill="#F5EFE0">摊位费更高 · 客流更大 · 票价更亲民 · 国际 Nieves 等参展</text>

    <rect x="480" y="558" width="234" height="78" fill="#1E4DBC"/>
    <text x="597" y="592" font-family="Impact, 'Arial Black', 'Microsoft YaHei', sans-serif" font-size="34" fill="#F5EFE0" text-anchor="middle">+ 1 WEEK</text>
    <text x="597" y="616" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="11" fill="#F5EFE0" text-anchor="middle">在 abC 上海站之后</text>
    <text x="597" y="630" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="11" fill="#F5EFE0" text-anchor="middle">一周内连贯发生</text>

    <rect x="730" y="558" width="234" height="78" fill="#FF5C8A"/>
    <text x="847" y="592" font-family="Impact, 'Arial Black', 'Microsoft YaHei', sans-serif" font-size="34" fill="#F5EFE0" text-anchor="middle">SHANGHAI</text>
    <text x="847" y="616" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="11" fill="#F5EFE0" text-anchor="middle">承办中国最多书展</text>
    <text x="847" y="630" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="11" fill="#F5EFE0" text-anchor="middle">每年的城市</text>

    <text x="984" y="592" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="13" font-weight="900" fill="#FF5C8A">→ 实用建议</text>
    <text x="984" y="612" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="11" fill="#F5EFE0">两周连开 ＝</text>
    <text x="984" y="626" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="11" fill="#F5EFE0">上海双周朝圣</text>
  </g>

  <g id="footer">
    <line x1="60" y1="690" x2="1220" y2="690" stroke="#1A1A1A" stroke-width="1"/>
    <text x="60" y="708" font-family="Consolas, 'Courier New', monospace" font-size="11" fill="#5A5A5A" letter-spacing="2">P13 · CHINA ART BOOK FAIR TWINS</text>
    <text x="1220" y="708" font-family="Consolas, 'Courier New', monospace" font-size="11" fill="#5A5A5A" text-anchor="end" letter-spacing="2">abC FIRST · UNFOLD AFTER · 上海双周</text>
  </g>
</svg>
