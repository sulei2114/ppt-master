    <text x="80" y="677" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="15" fill="#F5EFE0">额外提醒 ＞ 主流出版社的书随便哪里买都行 · 在独立书店买独立出版物 / 艺术家自费书 ·  那才是核心目标</text>
