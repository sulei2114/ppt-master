<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="kereScrim" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0A0A0A" stop-opacity="0.55"/>
      <stop offset="55%" stop-color="#0A0A0A" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#0A0A0A" stop-opacity="0.62"/>
    </linearGradient>
  </defs>

  <g id="bg-image">
    <image href="../images/kere_senegal_exterior.png" x="0" y="0" width="1280" height="720" preserveAspectRatio="xMidYMid slice"/>
    <rect x="0" y="0" width="1280" height="720" fill="url(#kereScrim)"/>
  </g>

  <g id="p10-header">
    <text x="60" y="78" font-family="Georgia, serif" font-size="14" fill="#E8C788" letter-spacing="3">08 · ROOTED IN EARTH</text>
    <text x="60" y="148" font-family="Georgia, &quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, serif" font-size="42" font-weight="bold" fill="#F5F2EC">夯土砖屏风 · 扎根乡土的温暖建筑</text>
    <line x1="60" y1="176" x2="180" y2="176" stroke="#B8935A" stroke-width="3"/>
    <text x="60" y="210" font-family="&quot;Microsoft YaHei&quot;, sans-serif" font-size="17" fill="#F5F2EC">迪埃贝多·凯雷 · 塞内加尔歌德学院</text>
    <text x="60" y="234" font-family="&quot;Microsoft YaHei&quot;, sans-serif" font-size="13" fill="#D4CFC4">2022 年普利兹克奖 · 2026.4 达喀尔开幕</text>
  </g>

  <g id="card-philosophy">
    <rect x="60" y="290" width="380" height="370" fill="#F5F2EC" fill-opacity="0.94"/>
    <line x1="60" y1="290" x2="60" y2="660" stroke="#B8935A" stroke-width="3"/>
    <text x="80" y="324" font-family="Georgia, serif" font-size="13" fill="#B8935A" letter-spacing="2">DESIGN PHILOSOPHY</text>
    <text x="80" y="360" font-family="Georgia, &quot;Microsoft YaHei&quot;, serif" font-size="22" font-weight="bold" fill="#1C1C1C">顺应自然 · 而非与之对抗</text>
    <line x1="80" y1="378" x2="120" y2="378" stroke="#B8935A" stroke-width="2"/>
    <text x="80" y="416" font-family="&quot;Microsoft YaHei&quot;, sans-serif" font-size="14" fill="#1C1C1C">
      <tspan x="80" dy="0">·  本土压制土砖构筑主体结构</tspan>
      <tspan x="80" dy="28">·  自然通风系统 · 摆脱空调依赖</tspan>
      <tspan x="80" dy="28">·  适配本土气候 · 节能 + 采光</tspan>
      <tspan x="80" dy="28">·  空间开放包容 · 服务社区</tspan>
    </text>
    <text x="80" y="568" font-family="KaiTi, Georgia, serif" font-size="15" fill="#5C5852" font-style="italic">
      <tspan x="80" dy="0">出生非洲 · 始终坚持以本土材料</tspan>
      <tspan x="80" dy="24">与可持续建造服务社区</tspan>
    </text>
    <line x1="80" y1="618" x2="120" y2="618" stroke="#B8935A" stroke-width="1"/>
    <text x="80" y="644" font-family="Georgia, &quot;Microsoft YaHei&quot;, serif" font-size="13" font-weight="bold" fill="#B8935A">迪埃贝多·弗朗西斯·凯雷</text>
  </g>

  <g id="card-courtyard">
    <rect x="470" y="290" width="240" height="370" fill="#F5F2EC" fill-opacity="0.94"/>
    <image href="../images/kere_senegal_courtyard.png" x="478" y="298" width="224" height="280" preserveAspectRatio="xMidYMid slice"/>
    <text x="478" y="606" font-family="Georgia, serif" font-size="13" fill="#B8935A" letter-spacing="2">CORE</text>
    <text x="478" y="630" font-family="Georgia, &quot;Microsoft YaHei&quot;, serif" font-size="15" font-weight="bold" fill="#1C1C1C">猴面包树 · 生命象征</text>
    <text x="478" y="650" font-family="&quot;Microsoft YaHei&quot;, sans-serif" font-size="12" fill="#5C5852">置入建筑核心院落</text>
  </g>

  <g id="card-interior">
    <rect x="740" y="290" width="480" height="370" fill="#1C1C1C" fill-opacity="0.86"/>
    <image href="../images/kere_senegal_interior.png" x="752" y="302" width="456" height="280" preserveAspectRatio="xMidYMid slice"/>
    <text x="752" y="610" font-family="Georgia, serif" font-size="13" fill="#E8C788" letter-spacing="2">INTERIOR</text>
    <text x="752" y="636" font-family="Georgia, &quot;Microsoft YaHei&quot;, serif" font-size="17" font-weight="bold" fill="#F5F2EC">承担文化交流 · 教育传播 · 艺术展演</text>
    <text x="752" y="654" font-family="&quot;Microsoft YaHei&quot;, sans-serif" font-size="12" fill="#D4CFC4">温润亲和的空间气质 · 连接社区 · 服务民众</text>
  </g>

  <g id="footer">
    <text x="60" y="700" font-family="KaiTi, serif" font-size="15" fill="#E8C788" font-style="italic">全球同质化时代 · 顶级建筑扎根土地 · 温暖人心</text>
    <text x="1220" y="700" text-anchor="end" font-family="Georgia, serif" font-size="11" fill="#D4CFC4">10 / 11 · 图源 Archdaily / 摄影 Iwan Baan</text>
  </g>
</svg>
