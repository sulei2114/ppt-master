    <text x="706" y="608" font-family="Arial, &quot;Microsoft YaHei&quot;, sans-serif" font-size="16" font-weight="700" fill="#1A1A2E">主场日: <tspan fill="#FF6B4A" font-weight="900">Day 5 · 7.22</tspan> 午夜炸场</text>
