    <line x1="120" y1="320" x2="1160" y2="320" stroke="#FF3DA5" stroke-width="2" stroke-dasharray="8,8" opacity="0.7"/>
  </g>

  <!-- Day 1 - OPENING (Pink) - Card above -->
