<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
    <!-- P01: Cover - ai_ops电信风格 -->
    <!-- Background -->
    <rect width="1280" height="720" fill="#FFFFFF"/>

    <!-- Top Red Banner -->
    <rect x="0" y="0" width="1280" height="8" fill="#C00000"/>

    <!-- Left Decorative Block: Red upper + Blue lower -->
    <rect x="0" y="0" width="60" height="360" fill="#C00000"/>
    <rect x="0" y="360" width="60" height="360" fill="#2E75B6"/>

    <!-- Warm Gray Subtitle Band -->
    <rect x="60" y="280" width="1220" height="60" fill="#F2F2F2"/>

    <!-- Title -->
    <text x="640" y="220" font-family="Microsoft YaHei, Arial, sans-serif" font-size="52" font-weight="bold" fill="#C00000" text-anchor="middle">机器人监控系统</text>

    <!-- Subtitle -->
    <text x="640" y="320" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" fill="#666666" text-anchor="middle">基于三层架构的机器人实时监控与故障排查平台 · 硬件安全兜底 → 大脑本地决策 → 平台辅助决策</text>

    <!-- Number Badges + Blue Tags -->
    <rect x="150" y="400" width="40" height="40" fill="#C00000"/>
    <text x="170" y="428" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#FFFFFF" text-anchor="middle">1</text>
    <rect x="200" y="400" width="100" height="40" fill="#2E75B6"/>
    <text x="250" y="427" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#FFFFFF" text-anchor="middle">三层架构</text>

    <rect x="320" y="400" width="40" height="40" fill="#C00000"/>
    <text x="340" y="428" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#FFFFFF" text-anchor="middle">2</text>
    <rect x="370" y="400" width="100" height="40" fill="#2E75B6"/>
    <text x="420" y="427" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#FFFFFF" text-anchor="middle">实时监控</text>

    <rect x="490" y="400" width="40" height="40" fill="#C00000"/>
    <text x="510" y="428" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#FFFFFF" text-anchor="middle">3</text>
    <rect x="540" y="400" width="100" height="40" fill="#2E75B6"/>
    <text x="590" y="427" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#FFFFFF" text-anchor="middle">异常告警</text>

    <rect x="660" y="400" width="40" height="40" fill="#C00000"/>
    <text x="680" y="428" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#FFFFFF" text-anchor="middle">4</text>
    <rect x="710" y="400" width="100" height="40" fill="#2E75B6"/>
    <text x="760" y="427" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#FFFFFF" text-anchor="middle">故障溯源</text>

    <rect x="830" y="400" width="40" height="40" fill="#C00000"/>
    <text x="850" y="428" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#FFFFFF" text-anchor="middle">5</text>
    <rect x="880" y="400" width="100" height="40" fill="#2E75B6"/>
    <text x="930" y="427" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#FFFFFF" text-anchor="middle">导航Agent</text>

    <rect x="1000" y="400" width="40" height="40" fill="#C00000"/>
    <text x="1020" y="428" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#FFFFFF" text-anchor="middle">6</text>
    <rect x="1050" y="400" width="120" height="40" fill="#2E75B6"/>
    <text x="1110" y="427" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#FFFFFF" text-anchor="middle">四级优化路径</text>

    <!-- Dashed Separator -->
    <line x1="120" y1="480" x2="1160" y2="480" stroke="#E7E6E6" stroke-width="1" stroke-dasharray="5 5"/>

    <!-- Author & Date -->
    <text x="640" y="560" font-family="Microsoft YaHei, Arial, sans-serif" font-size="20" fill="#333333" text-anchor="middle">技术主管汇报</text>
    <text x="640" y="600" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" fill="#999999" text-anchor="middle">2026年6月</text>

    <!-- Bottom Warm Accent + Blue Band -->
    <rect x="0" y="680" width="1280" height="10" fill="#FDF3EB"/>
    <rect x="0" y="690" width="1280" height="30" fill="#2E75B6"/>
</svg>