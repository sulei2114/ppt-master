        </g>

        <!-- Level 3: 平台辅助决策 -->
        <g transform="translate(700, 575)">
            <rect width="340" height="90" rx="8" fill="#9C27B0" fill-opacity="0.06" stroke="#9C27B0" stroke-width="1"/>
            <text x="12" y="22" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" font-weight="bold" fill="#9C27B0">③ 平台辅助/人工决策（复杂异常）</text>
            <text x="12" y="40" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" fill="#616161">隐性劣化: 轴承磨损·齿轮老化</text>
            <text x="12" y="55" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" fill="#616161">复杂关联: 多机器人协同冲突</text>
            <text x="12" y="70" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" fill="#616161">疑难故障: 无明确代码·间歇发作</text>
            <rect x="260" y="55" width="68" height="26" rx="4" fill="#9C27B0" fill-opacity="0.15"/>
            <text x="294" y="72" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" fill="#9C27B0">人工确认</text>
        </g>

