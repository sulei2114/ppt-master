            <text x="320" y="473" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" fill="#1565C0">Ⅰ级轻微: 容错继续 | Ⅱ级中度: 暂停等待</text>
            <text x="320" y="488" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" fill="#F44336">Ⅲ级严重: 急停锁数据 | 故障自检</text>
        </g>

        <!-- DTU通讯 -->
        <g filter="url(#cardShadow)">
            <rect x="602" y="405" width="160" height="100" rx="8" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1"/>
            <use data-icon="tabler-outline/arrow-down" x="610" y="415" width="28" height="28" fill="#0D47A1" stroke-width="2"/>
            <text x="646" y="435" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" font-weight="bold" fill="#0D47A1">通讯模块</text>
            <text x="610" y="455" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" fill="#616161">4G/以太网DTU</text>
