            <text x="436" y="190" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" fill="#616161">弹窗 + 短信/APP推送</text>
        </g>

        <g filter="url(#cardShadow)">
            <rect x="585" y="145" width="145" height="58" rx="6" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1"/>
            <use data-icon="tabler-outline/bug" x="593" y="153" width="24" height="24" fill="#FF9800" stroke-width="2"/>
            <text x="625" y="170" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" font-weight="bold" fill="#0D47A1">故障溯源</text>
            <text x="593" y="190" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" fill="#616161">历史分析 · 定位诱因</text>
        </g>

        <g filter="url(#cardShadow)">
            <rect x="742" y="145" width="170" height="58" rx="6" fill="#1E88E5" fill-opacity="0.08" stroke="#1E88E5" stroke-width="1"/>
            <use data-icon="tabler-outline/circle-check" x="750" y="153" width="24" height="24" fill="#1E88E5" stroke-width="2"/>
            <text x="782" y="170" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" font-weight="bold" fill="#0D47A1">远程控制下发</text>
            <text x="750" y="190" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" fill="#1E88E5">暂停·急停·重试·回原点</text>
        </g>

        <g filter="url(#cardShadow)">
            <rect x="924" y="145" width="156" height="58" rx="6" fill="#9C27B0" fill-opacity="0.08" stroke="#9C27B0" stroke-width="1"/>
            <use data-icon="tabler-outline/chart-line" x="932" y="153" width="24" height="24" fill="#9C27B0" stroke-width="2"/>
            <text x="964" y="170" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" font-weight="bold" fill="#0D47A1">辅助决策分析</text>
            <text x="932" y="190" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" fill="#9C27B0">隐性劣化·复杂关联</text>
        </g>
