    <!-- ==================== 三级决策架构说明 ==================== -->
    <g id="decision-levels">
        <rect x="40" y="535" width="1200" height="145" rx="10" fill="#F8FAFC" stroke="#E0E0E0" stroke-width="1"/>
        <text x="60" y="560" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" font-weight="bold" fill="#0D47A1">三级分层决策架构</text>

