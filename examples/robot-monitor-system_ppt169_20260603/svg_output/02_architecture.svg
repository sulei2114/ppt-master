<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
    <!-- P02: 系统总体架构（三层架构）- 上层在上，底层在下 -->
    <defs>
        <filter id="cardShadow" x="-15%" y="-15%" width="130%" height="130%">
            <feGaussianBlur in="SourceAlpha" stdDeviation="4"/>
            <feOffset dx="0" dy="2" result="offsetblur"/>
            <feFlood flood-color="#0D2137" flood-opacity="0.06" result="shadowColor"/>
            <feComposite in="shadowColor" in2="offsetblur" operator="in" result="shadow"/>
            <feMerge><feMergeNode in="shadow"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <marker id="arrowDown" markerWidth="10" markerHeight="10" refX="5" refY="10" orient="auto">
            <path d="M0,0 L5,10 L10,0 Z" fill="#1E88E5"/>
        </marker>
        <marker id="arrowUp" markerWidth="10" markerHeight="10" refX="5" refY="0" orient="auto">
            <path d="M0,10 L5,0 L10,10 Z" fill="#FF9800"/>
        </marker>
    </defs>

    <!-- Background -->
    <rect width="1280" height="720" fill="#FFFFFF"/>

    <!-- Title Area -->
    <rect x="40" y="32" width="8" height="36" rx="4" fill="#0D47A1"/>
    <text x="64" y="60" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="32" font-weight="bold" fill="#0D47A1">系统总体架构（三层架构）</text>
    <text x="64" y="88" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" fill="#616161" letter-spacing="0.5">上层应用层 · 中间服务层 · 底层采集层 · 硬件安全回路</text>

    <!-- ==================== Layer 3: 上层应用层（顶层） ==================== -->
    <g id="layer3">
