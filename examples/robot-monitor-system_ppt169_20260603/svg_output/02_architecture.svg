            <use data-icon="tabler-outline/robot" x="122" y="415" width="28" height="28" fill="#0D47A1" stroke-width="2"/>
            <text x="158" y="435" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" font-weight="bold" fill="#0D47A1">机器人控制柜</text>
            <text x="122" y="455" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" fill="#616161">ABB·安川·国产六轴</text>
            <text x="122" y="470" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" fill="#616161">Modbus/原生协议</text>
