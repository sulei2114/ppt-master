            <text x="12" y="22" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" font-weight="bold" fill="#F44336">① 硬件安全回路决策</text>
            <text x="12" y="40" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" fill="#616161">触发: 急停·光栅·碰撞·过流</text>
