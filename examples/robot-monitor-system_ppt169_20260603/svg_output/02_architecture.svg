        <line x1="620" y1="365" x2="620" y2="345" stroke="#FF9800" stroke-width="2" marker-end="url(#arrowUp)"/>
        <text x="630" y="360" font-family="Microsoft YaHei, Arial, sans-serif" font-size="8" fill="#FF9800">指令执行</text>
    </g>

    <!-- ==================== Layer 1: 底层采集层 ==================== -->
    <g id="layer1">
        <rect x="40" y="370" width="40" height="150" rx="8" fill="#0D47A1"/>
        <text x="60" y="452" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#FFFFFF">01</text>

        <rect x="96" y="370" width="1000" height="150" rx="12" fill="#F0F4F8" stroke="#1E88E5" stroke-width="1" stroke-dasharray="6 4"/>
        <text x="596" y="392" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="12" font-weight="bold" fill="#0D47A1" letter-spacing="1">底层采集层（机器人端 + 机器人大脑）—— 本地实时决策</text>

        <!-- 机器人控制柜 -->
        <g filter="url(#cardShadow)">
