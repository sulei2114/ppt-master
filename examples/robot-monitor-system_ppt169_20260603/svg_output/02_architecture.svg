            <text x="12" y="70" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" fill="#F44336">特点: 不经过大脑·毫秒级响应</text>
            <rect x="180" y="55" width="68" height="26" rx="4" fill="#F44336" fill-opacity="0.15"/>
            <text x="214" y="72" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" fill="#F44336">最高优先</text>
        </g>

        <!-- Level 2: 大脑本地决策 -->
        <g transform="translate(340, 575)">
            <rect width="340" height="90" rx="8" fill="#1E88E5" fill-opacity="0.06" stroke="#1E88E5" stroke-width="1"/>
            <text x="12" y="22" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" font-weight="bold" fill="#1E88E5">② 机器人大脑本地决策（90%+异常）</text>
            <text x="12" y="40" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" fill="#1565C0">Ⅰ级轻微: 本地容错继续运行</text>
            <text x="12" y="55" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" fill="#FF9800">Ⅱ级中度: 暂停任务等待指令</text>
            <text x="12" y="70" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" fill="#F44336">Ⅲ级严重: 紧急停机锁存数据</text>
