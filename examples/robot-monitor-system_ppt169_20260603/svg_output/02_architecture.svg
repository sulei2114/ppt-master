            <use data-icon="tabler-outline/circle-check" x="764" y="283" width="24" height="24" fill="#FF9800" stroke-width="2"/>
            <text x="796" y="300" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" font-weight="bold" fill="#0D47A1">指令下发管理</text>
            <text x="764" y="320" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" fill="#616161">TCP/MQTT协议</text>
