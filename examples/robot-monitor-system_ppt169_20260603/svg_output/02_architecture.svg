            <use data-icon="tabler-outline/database" x="938" y="283" width="24" height="24" fill="#9C27B0" stroke-width="2"/>
            <text x="970" y="300" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" font-weight="bold" fill="#0D47A1">知识库分析</text>
            <text x="938" y="320" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" fill="#9C27B0">故障诊断·趋势预警</text>
