            <text x="311" y="170" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" font-weight="bold" fill="#0D47A1">实时监控</text>
            <text x="279" y="190" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" fill="#616161">状态看板 · 参数展示</text>
