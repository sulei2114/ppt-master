        <rect x="40" y="110" width="40" height="105" rx="8" fill="#1565C0"/>
        <text x="60" y="170" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#FFFFFF">03</text>

        <!-- Layer Container -->
        <rect x="96" y="110" width="1000" height="105" rx="12" fill="#E3F2FD" stroke="#1565C0" stroke-width="1" stroke-dasharray="6 4"/>
        <text x="596" y="132" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="12" font-weight="bold" fill="#0D47A1" letter-spacing="1">上层应用层（Web监控平台）—— 平台辅助决策</text>

        <!-- Cards -->
