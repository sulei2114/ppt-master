        <g filter="url(#cardShadow)">
            <rect x="328" y="275" width="200" height="58" rx="6" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1"/>
            <use data-icon="tabler-outline/alert-triangle" x="336" y="283" width="24" height="24" fill="#F44336" stroke-width="2"/>
            <text x="368" y="300" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" font-weight="bold" fill="#0D47A1">异常阈值检测</text>
            <text x="336" y="320" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" fill="#616161">电流/温度超标→自动标记</text>
