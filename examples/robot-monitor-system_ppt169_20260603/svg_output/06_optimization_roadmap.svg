<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
    <!-- P06: 四阶段优化路径 -->
    <defs>
        <filter id="cardShadow" x="-15%" y="-15%" width="130%" height="130%">
            <feGaussianBlur in="SourceAlpha" stdDeviation="4"/>
            <feOffset dx="0" dy="2" result="offsetblur"/>
            <feFlood flood-color="#0D2137" flood-opacity="0.06" result="shadowColor"/>
            <feComposite in="shadowColor" in2="offsetblur" operator="in" result="shadow"/>
            <feMerge><feMergeNode in="shadow"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
    </defs>

    <!-- Background -->
    <rect width="1280" height="720" fill="#FFFFFF"/>

    <!-- Title Area -->
    <rect x="40" y="32" width="8" height="36" rx="4" fill="#0D47A1"/>
    <text x="64" y="60" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="28" font-weight="bold" fill="#0D47A1">四阶段优化路径</text>
    <text x="64" y="86" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="15" fill="#616161">调研2022-2026年导航领域13篇里程碑论文 · 从"能跑通"到"跑得稳准实快"</text>

    <!-- ==================== 第一阶段 ==================== -->
    <g id="phase1">
        <rect x="40" y="105" width="285" height="290" rx="10" fill="#1565C0" fill-opacity="0.04" stroke="#1565C0" stroke-width="1.5"/>
        <rect x="40" y="105" width="285" height="42" rx="10" fill="#1565C0"/>
        <rect x="40" y="125" width="285" height="22" fill="#1565C0"/>
        <text x="182" y="132" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF">第一阶段：工程守底</text>

        <rect x="52" y="155" width="60" height="22" rx="4" fill="#1565C0" fill-opacity="0.15"/>
        <text x="82" y="170" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" fill="#1565C0">预计1周</text>

        <text x="52" y="195" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" font-weight="bold" fill="#0D47A1">目标：让机器人"跑得稳"</text>

        <rect x="52" y="207" width="261" height="70" rx="6" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1"/>
        <text x="62" y="225" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" fill="#1E88E5" font-weight="bold">引入：SayCan + Grounded Decoding</text>
        <text x="62" y="240" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" fill="#616161">• 结构化输出校验：格式错误自动重试</text>
        <text x="62" y="255" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" fill="#616161">• 可执行性评分：不可达时规则兜底</text>
        <text x="62" y="270" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" fill="#616161">• 关键字段兜底：避免运行时崩溃</text>

        <text x="52" y="295" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" fill="#616161">解决：#2幻觉选错、#7格式崩坏</text>
        <rect x="52" y="305" width="261" height="24" rx="4" fill="#1565C0" fill-opacity="0.1"/>
        <text x="62" y="322" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" fill="#1565C0" font-weight="bold">预期：失败率 10-15% → &lt;3%</text>
    </g>

    <!-- ==================== 第二阶段 ==================== -->
    <g id="phase2">
