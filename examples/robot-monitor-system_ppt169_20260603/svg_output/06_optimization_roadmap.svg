        <text x="357" y="195" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" font-weight="bold" fill="#0D47A1">目标：让机器人"跑得准"</text>

        <rect x="357" y="207" width="261" height="70" rx="6" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1"/>
        <text x="367" y="225" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" fill="#1E88E5" font-weight="bold">引入：SayPlan + ConceptGraphs + VLMaps</text>
        <text x="367" y="240" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" fill="#616161">• 层级规划：先选区域再选viewpoint</text>
        <text x="367" y="255" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" fill="#616161">• 开放词汇场景图：CLIP向量匹配</text>
        <text x="367" y="270" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" fill="#616161">• 空间语言理解：复杂方位指令</text>

        <text x="357" y="295" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" fill="#616161">解决：#1封闭词汇、#2扁平规划</text>
